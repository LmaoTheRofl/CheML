name: chemx

x-chemx-common: &chemx-common
  image: chemx-parser:local
  build:
    context: .
    dockerfile: Dockerfile
    args:
      INSTALL_CODEX: "${INSTALL_CODEX:-1}"
      INSTALL_MOLSCRIBE: "${INSTALL_MOLSCRIBE:-1}"
      DOWNLOAD_MODELS: "${DOWNLOAD_MODELS:-1}"
      CHEMX_MODEL_DOWNLOAD_ATTEMPTS: "${CHEMX_MODEL_DOWNLOAD_ATTEMPTS:-20}"
      CHEMX_MODEL_DOWNLOAD_READ_TIMEOUT_SECONDS: "${CHEMX_MODEL_DOWNLOAD_READ_TIMEOUT_SECONDS:-180}"
      CHEMX_MODEL_DOWNLOAD_CONNECT_TIMEOUT_SECONDS: "${CHEMX_MODEL_DOWNLOAD_CONNECT_TIMEOUT_SECONDS:-20}"
  working_dir: /workspace
  volumes:
    - .:/workspace
    - uv-cache:/opt/uv-cache
  environment:
    XDG_CACHE_HOME: /opt/chemx-cache
    UV_CACHE_DIR: /opt/uv-cache
    UV_PROJECT_ENVIRONMENT: /opt/chemx-venv
    CHEMX_MARKER_PAGE_CHUNK_SIZE: "${CHEMX_MARKER_PAGE_CHUNK_SIZE:-1}"
    CHEMX_OCR_COMMAND: "tesseract {image} stdout -l eng"
    CHEMX_MOLSCRIBE_COMMAND: "/opt/molscribe-venv/bin/python /workspace/scripts/molscribe_predict.py --model /opt/chemx-models/molscribe/swin_base_char_aux_1m680k.pth {image}"
    CHEMX_OLLAMA_ADAPTER_URL: "http://ollama-adapter:11434"
    OLLAMA_UPSTREAM_URL: "ollama:11434"
    OPENAI_API_KEY: "${OPENAI_API_KEY:-}"

services:
  chemx:
    <<: *chemx-common
    entrypoint: ["uv", "run", "--no-sync", "chemx"]
    command: ["--help"]

  ui:
    <<: *chemx-common
    entrypoint: ["uv", "run", "--no-sync", "chemx"]
    command: ["ui", "--runs-dir", "/workspace/runs"]
    ports:
      - "${CHEMX_UI_PORT:-8501}:8501"
    environment:
      XDG_CACHE_HOME: /opt/chemx-cache
      UV_CACHE_DIR: /opt/uv-cache
      UV_PROJECT_ENVIRONMENT: /opt/chemx-venv
      CHEMX_MARKER_PAGE_CHUNK_SIZE: "${CHEMX_MARKER_PAGE_CHUNK_SIZE:-1}"
      CHEMX_OCR_COMMAND: "tesseract {image} stdout -l eng"
      CHEMX_MOLSCRIBE_COMMAND: "/opt/molscribe-venv/bin/python /workspace/scripts/molscribe_predict.py --model /opt/chemx-models/molscribe/swin_base_char_aux_1m680k.pth {image}"
      CHEMX_OLLAMA_ADAPTER_URL: "http://ollama-adapter:11434"
      OLLAMA_UPSTREAM_URL: "ollama:11434"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"

  ollama:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    profiles: ["ollama"]
    volumes:
      - ollama-models:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 60

  ollama-pull:
    image: ollama/ollama:${OLLAMA_IMAGE_TAG:-latest}
    profiles: ["ollama"]
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-models:/root/.ollama
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: ["ollama"]
    command: ["pull", "${OLLAMA_MODEL:-lukaspetrik/gemma3-tools:27b}"]
    restart: "no"

  ollama-adapter:
    <<: *chemx-common
    profiles: ["ollama"]
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    entrypoint: ["uv", "run", "--no-sync", "python", "-m", "chemx.ollama_adapter"]
    command:
      - "--listen"
      - "0.0.0.0:11434"
      - "--upstream"
      - "ollama:11434"
      - "--ollama-bin"
      - "ollama"
    ports:
      - "${CHEMX_OLLAMA_ADAPTER_PORT:-11434}:11434"
    environment:
      XDG_CACHE_HOME: /opt/chemx-cache
      UV_CACHE_DIR: /opt/uv-cache
      UV_PROJECT_ENVIRONMENT: /opt/chemx-venv
      CHEMX_MARKER_PAGE_CHUNK_SIZE: "${CHEMX_MARKER_PAGE_CHUNK_SIZE:-1}"
      CHEMX_OCR_COMMAND: "tesseract {image} stdout -l eng"
      CHEMX_MOLSCRIBE_COMMAND: "/opt/molscribe-venv/bin/python /workspace/scripts/molscribe_predict.py --model /opt/chemx-models/molscribe/swin_base_char_aux_1m680k.pth {image}"
      CHEMX_OLLAMA_ADAPTER_URL: "http://ollama-adapter:11434"
      OLLAMA_UPSTREAM_URL: "ollama:11434"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"

volumes:
  uv-cache:
  ollama-models:
